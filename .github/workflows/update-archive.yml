name: Update Archive
on:
  workflow_dispatch:
    inputs:
      full_reimport:
        description: Full reimport (drop + recreate) instead of incremental update
        type: boolean
        default: false
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: Open-Athena/discord-agent/actions/update-archive@v1
        with:
          guild_id: ${{ vars.DISCORD_GUILD }}
          discord_token: ${{ secrets.DISCORD_TOKEN }}
          cloudflare_token: ${{ secrets.CLOUDFLARE_TOKEN }}
          cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          full_reimport: ${{ inputs.full_reimport }}
          wrangler_toml: api/wrangler.toml

      - name: Upload archive.db to S3
        run: aws s3 cp archive.db s3://openathena/marin-discord/archive.db
