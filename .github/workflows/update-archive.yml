name: Update Archive
on:
  workflow_dispatch:
    inputs:
      full_reimport:
        description: Full reimport (drop + recreate) instead of incremental update
        type: boolean
        default: false
  # schedule:
  #   - cron: '0 8 * * *'  # Daily at 8am UTC

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Pull existing archive from DVX cache
      - run: dvx pull
        env:
          AWS_PROFILE: ""

      # Fetch new messages from Discord (incremental)
      - run: uv run archive.py

      # Rebuild SQLite from JSON
      - run: uv run build_db.py

      # Update DVX cache with new archive
      - run: dvx add archive
      - run: dvx push
        env:
          AWS_PROFILE: ""

      - run: pnpm install --frozen-lockfile
        working-directory: api

      # Import to D1
      - name: Incremental D1 sync
        if: ${{ !inputs.full_reimport }}
        working-directory: api
        run: uv run d1-sync.py --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Full D1 reimport
        if: ${{ inputs.full_reimport }}
        working-directory: api
        run: ./d1-import.sh --remote ../archive.db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Commit updated archive.dvc if changed
      - name: Commit archive update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet archive.dvc; then
            echo "No archive changes"
          else
            git add archive.dvc
            git commit -m "Update archive $(date -u +%Y-%m-%d)"
            git push
          fi
