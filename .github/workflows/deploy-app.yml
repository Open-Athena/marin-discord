name: Deploy Viewer App
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .discord-agent/app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        shell: bash
        working-directory: .discord-agent/app
      - run: pnpm build
        shell: bash
        working-directory: .discord-agent/app
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name ${{ vars.PAGES_PROJECT_NAME }} --branch main
          workingDirectory: .discord-agent/app
