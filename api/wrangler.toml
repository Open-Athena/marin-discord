name = "marin-discord-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "marin-discord"
database_id = "8ca54637-0c8a-42fd-9ffe-5f2f97d3b960"

[dev]
port = 5273

[vars]
CORS_ORIGIN = "*"
GUILD_ID = "1354881461060243556"
ARCHIVE_DB_URL = "https://pub-5b49496c4901401b9debf2fcb8cf0ce0.r2.dev/archive.db"

# Cron: run the scheduled() handler every 10 minutes to incrementally
# update D1 from Discord. DISCORD_TOKEN must be set via
# `wrangler secret put DISCORD_TOKEN`.
[triggers]
crons = ["*/10 * * * *"]
